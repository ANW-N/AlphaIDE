<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraAI Studio - Live IDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined">
    <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/editor/editor.main.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-screen w-screen flex flex-col overflow-hidden select-none antialiased" data-theme="dark">

    <!-- HEADER -->
    <header class="h-12 w-full flex items-center justify-between px-4 z-50 border-b border-[var(--border-color)] bg-[var(--panel-bg)] shadow-md">
        <div class="flex items-center gap-5">
            <div class="flex items-center gap-2">
                <div class="w-6 h-6 rounded-md bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center shadow-lg shadow-cyan-500/20">
                    <span class="material-icons-outlined text-white text-[14px]">bolt</span>
                </div>
                <span class="font-bold text-[14px] tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">AuraAI</span>
            </div>
            
            <div class="relative group">
                <button onclick="toggleFileMenu(event)" class="flex items-center gap-1 px-3 py-1.5 text-xs font-medium hover-effect rounded-lg transition-all duration-300">
                    Fayl <span class="material-icons-outlined text-[16px] transition-transform duration-300 group-hover:rotate-180">expand_more</span>
                </button>
                <div id="file-dropdown" class="absolute top-9 left-0 w-52 bg-[var(--panel-bg)] border border-[var(--border-color)] p-1.5 hidden opacity-0 scale-95 shadow-2xl z-50 rounded-xl backdrop-blur-xl transition-all duration-200">
                    <button onclick="openLocalFile()" class="w-full flex items-center gap-3 px-3 py-2.5 text-xs font-medium hover-effect rounded-lg text-[var(--text-main)]">
                        <span class="material-icons-outlined text-[18px] text-cyan-400">description</span> Faylni ochish
                    </button>
                    <button onclick="openLocalFolder()" class="w-full flex items-center gap-3 px-3 py-2.5 text-xs font-medium hover-effect rounded-lg text-[var(--text-main)]">
                        <span class="material-icons-outlined text-[18px] text-blue-400">folder_open</span> Papkani ochish
                    </button>
                    <div class="h-px w-full bg-[var(--border-color)] my-1.5"></div>
                    <button onclick="saveCurrentFile()" class="w-full flex items-center justify-between px-3 py-2.5 text-xs font-medium hover-effect rounded-lg text-[var(--text-main)]">
                        <div class="flex items-center gap-3"><span class="material-icons-outlined text-[18px] text-emerald-400">save</span> Saqlash</div>
                        <span class="text-[10px] opacity-40 font-mono font-bold">CTRL+S</span>
                    </button>
                </div>
            </div>
        </div>
        
        <div class="flex items-center gap-2">
            <button onclick="toggleLivePreview()" id="btn-live-preview" class="flex items-center gap-1.5 bg-emerald-500/10 text-emerald-500 hover:bg-emerald-500/20 px-3 py-1.5 rounded-lg text-xs font-bold transition-all mr-2">
                <span class="material-icons-outlined text-[16px]">play_circle</span> Jonli ko'rish
            </button>
            <button onclick="toggleFullScreen()" class="hover-effect p-2 rounded-lg flex items-center transition-all text-[var(--text-muted)] hover:text-[var(--accent-color)]" title="To'liq ekran">
                <span id="fullscreen-icon" class="material-icons-outlined text-[20px]">fullscreen</span>
            </button>
            <button onclick="toggleTheme()" class="hover-effect p-2 rounded-lg flex items-center transition-all text-[var(--text-muted)] hover:text-amber-400" title="Temani o'zgartirish">
                <span id="theme-icon" class="material-icons-outlined text-[20px]">light_mode</span>
            </button>
        </div>
    </header>

    <!-- ASOSIY QISM -->
    <div class="flex-1 w-full flex overflow-hidden z-10 bg-[var(--bg-main)]">
        
        <!-- ACTIVITY BAR -->
        <nav class="w-14 h-full flex flex-col items-center py-3 gap-5 z-20 border-r border-[var(--border-color)] bg-[var(--activity-bar-bg)]">
            <button onclick="toggleActivityPanel('explorer')" id="btn-explorer" class="activity-icon active" title="Loyiha fayllari">
                <span class="material-icons-outlined text-[24px]">folder_copy</span>
            </button>
            <button onclick="toggleActivityPanel('plugins')" id="btn-plugins" class="activity-icon" title="AuraAI Backend">
                <span class="material-icons-outlined text-[24px]">api</span>
            </button>
            <div class="mt-auto flex flex-col gap-5 mb-3">
                <button onclick="toggleActivityPanel('settings')" id="btn-settings" class="activity-icon" title="Sozlamalar">
                    <span class="material-icons-outlined text-[24px]">tune</span>
                </button>
            </div>
        </nav>

        <!-- SIDEBAR -->
        <aside id="slidebar_panel" class="h-full flex flex-col relative z-10 bg-[var(--panel-bg)] border-r border-[var(--border-color)] shadow-xl transition-all duration-300 w-[280px]">
            <div class="px-5 py-3 flex items-center justify-between min-h-[48px] border-b border-[var(--border-color)]">
                <span id="sidebar-title" class="text-[12px] font-semibold tracking-wider uppercase text-[var(--text-muted)]">Explorer</span>
                <button onclick="toggleActivityPanel(currentActivePanel)" class="hover-effect rounded p-1 opacity-50 hover:opacity-100 transition-all text-[var(--text-main)]">
                    <span class="material-icons-outlined text-[18px]">menu_open</span>
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-2 text-[13px] text-[var(--text-main)]" id="sidebar-content">
                <!-- EXPLORER -->
                <div id="panel-explorer" class="panel-content">
                    <div id="file-tree" class="flex flex-col">
                        <div class="opacity-40 text-center mt-12 p-4 flex flex-col items-center gap-3">
                            <span class="material-icons-outlined text-4xl">inventory_2</span>
                            <span class="text-[11px]">Loyiha yuklanmagan.<br>Fayl menyusidan oching.</span>
                        </div>
                    </div>
                </div>

                <!-- PLUGINS -->
                <div id="panel-plugins" class="panel-content hidden flex-col h-full gap-3 p-1">
                    <div class="text-[11px] opacity-60 font-medium mb-1 px-1">AuraAI Server API</div>
                    <div id="plugin-messages" class="flex-1 overflow-y-auto space-y-3 py-2 scroll-smooth px-1"></div>
                    <div class="flex flex-col gap-2 pt-3 border-t border-[var(--border-color)] px-1">
                        <textarea id="plugin-user-msg" rows="2" placeholder="Xabar..." class="custom-input resize-none"></textarea>
                        <button onclick="sendToPluginAI()" class="btn-primary">Yuborish</button>
                    </div>
                </div>

                <!-- SETTINGS -->
                <div id="panel-settings" class="panel-content hidden space-y-5 mt-2 px-1">
                    <div class="flex flex-col gap-4">
                        <div class="flex items-center justify-between text-[12px] font-medium">
                            <span class="text-[var(--text-muted)]">Shrift o'lchami</span>
                            <input type="number" id="setting-fontsize" value="15" class="custom-input w-16 text-center font-mono" onchange="updateEditorSettings()">
                        </div>
                        <div class="flex items-center justify-between text-[12px] font-medium">
                            <span class="text-[var(--text-muted)]">Avto-tekislash</span>
                            <input type="checkbox" id="setting-wordwrap" class="w-4 h-4 accent-cyan-500 cursor-pointer" onchange="updateEditorSettings()">
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- KOD VA PREVIEW MAYDONI -->
        <main class="flex-1 h-full flex flex-col overflow-hidden relative">
            <div id="tabs-container" class="h-10 flex items-center gap-1 overflow-x-auto select-none bg-[var(--activity-bar-bg)] border-b border-[var(--border-color)] px-2 shadow-sm">
                <!-- Default Tab -->
                <div class="tab-active px-4 py-2 text-[12px] font-medium flex items-center gap-2 cursor-pointer transition-colors duration-200">
                    <span class="material-icons-outlined text-[14px] text-cyan-400">html</span> index.html
                </div>
            </div>
            
            <div class="flex-1 flex w-full h-full overflow-hidden relative">
                <!-- EDITOR QISMI (XATO SHU YERDA EDI, absolute inset-0 QO'SHILDI) -->
                <div id="editor-wrapper" class="flex-1 h-full relative">
                    <div id="monaco-container" class="absolute inset-0 bg-[var(--monaco-bg)]"></div>
                </div>
                
                <!-- JONLI NATIJA -->
                <div id="preview-container" class="w-0 h-full bg-white border-l border-[var(--border-color)] transition-all duration-300 flex flex-col hidden relative z-10">
                    <div class="h-8 bg-[#f5f5f5] text-black flex items-center justify-between px-3 border-b border-gray-300 select-none">
                        <span class="text-[10px] font-bold uppercase tracking-wider opacity-50">Jonli Natija (Live)</span>
                        <span class="material-icons-outlined text-[14px] opacity-50">public</span>
                    </div>
                    <iframe id="live-preview-frame" class="flex-1 w-full bg-white border-none"></iframe>
                </div>
            </div>
            
            <!-- STATUS BAR -->
            <div class="h-7 border-t border-[var(--border-color)] px-4 flex items-center justify-between text-[11px] bg-[var(--activity-bar-bg)] font-mono">
                <div class="flex items-center gap-5">
                    <div class="flex items-center gap-1.5 text-[var(--text-muted)]">
                        <span class="material-icons-outlined text-[14px]">code</span>
                        <span id="editor-language">html</span>
                    </div>
                    <div id="sync-status" class="flex items-center gap-1.5 text-emerald-400">
                        <span class="material-icons-outlined text-[14px]">cloud_done</span> Ready
                    </div>
                </div>
                <div class="opacity-40 tracking-wider">AuraAI Engine &copy; 2026</div>
            </div>
        </main>
    </div>

    <!-- ALERTS -->
    <div id="save-alert" class="fixed bottom-10 right-10 bg-emerald-500/20 border border-emerald-500/30 text-emerald-400 px-5 py-3 rounded-xl text-xs font-bold flex items-center gap-3 transform transition-all duration-500 translate-y-[200%] opacity-0 z-50 backdrop-blur-xl shadow-2xl">
        <span class="material-icons-outlined text-[18px]">check_circle</span> Muvaffaqiyatli saqlandi!
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
